<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LearnCrib – Tutor Earnings</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{primary:'#1939D4',secondary:'#0A1444',accent:'#F0B429'},fontFamily:{outfit:['Plus Jakarta Sans','sans-serif'],inter:['Plus Jakarta Sans','sans-serif']}}}}</script>
  <link rel="stylesheet" href="../assets/css/main.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
</head>
<body class="bg-gray-50">
<div class="container-app pb-28">

  <!-- Header -->
  <div class="px-5 pt-12 pb-6 flex items-center justify-between sticky top-0 bg-white z-40 bg-opacity-90 backdrop-blur-md">
    <button onclick="history.back()" class="w-10 h-10 rounded-2xl glass-card flex items-center justify-center">
      <i data-lucide="arrow-left" class="w-4 h-4 text-gray-500"></i>
    </button>
    <h1 class="font-outfit font-bold text-xl" style="color:var(--secondary)">Earnings</h1>
    <button class="w-10 h-10 rounded-2xl glass-card flex items-center justify-center">
      <i data-lucide="download" class="w-4 h-4 text-gray-500"></i>
    </button>
  </div>

  <!-- Summary Card -->
  <div class="px-5 mb-6">
    <div class="glass-card p-6" style="background:linear-gradient(135deg, var(--primary) 0%, hsl(175,80%,30%) 100%)">
       <p class="font-inter text-xs text-white opacity-60 uppercase tracking-widest mb-1">Available for Withdrawal</p>
       <h3 class="font-outfit font-bold text-4xl text-white">₦42,850.00</h3>
       
       <div class="flex items-center gap-2 mt-4">
          <button class="btn-primary bg-white text-teal-700 flex-1 justify-center py-2.5 text-sm">Withdraw to Bank</button>
       </div>
    </div>
  </div>

  <!-- Stats Grid -->
  <div class="px-5 grid grid-cols-2 gap-3 mb-8">
     <div class="glass-card p-4">
        <p class="font-inter text-xs" style="color:rgba(26,43,68,.5)">This Month</p>
        <p class="font-outfit font-bold text-xl mt-1" style="color:var(--secondary)">₦12,500</p>
        <div class="flex items-center gap-1 mt-1 text-emerald-500 text-xs">
           <i data-lucide="trending-up" class="w-3 h-3"></i> +12%
        </div>
     </div>
     <div class="glass-card p-4">
        <p class="font-inter text-xs" style="color:rgba(26,43,68,.5)">Total Earned</p>
        <p class="font-outfit font-bold text-xl mt-1" style="color:var(--secondary)">₦156,000</p>
        <p class="font-inter text-xs mt-1" style="color:rgba(26,43,68,.4)">since Jan 2026</p>
     </div>
  </div>

  <!-- Activity / History -->
  <div class="px-5">
    <div class="flex items-center justify-between mb-4">
       <h3 class="font-outfit font-semibold text-lg" style="color:var(--secondary)">Recent Payouts</h3>
       <button class="text-xs font-inter font-semibold" style="color:var(--primary)">View All</button>
    </div>

    <div class="flex flex-col gap-3">
       <div class="glass-card p-4 flex items-center justify-between">
          <div class="flex items-center gap-3">
             <div class="w-10 h-10 rounded-xl bg-emerald-50 flex items-center justify-center">
                <i data-lucide="check" class="w-5 h-5 text-emerald-500"></i>
             </div>
             <div>
                <p class="font-outfit font-semibold text-sm" style="color:var(--secondary)">Bank Transfer</p>
                <p class="font-inter text-xs" style="color:rgba(26,43,68,.4)">Apr 1, 2026</p>
             </div>
          </div>
          <p class="font-outfit font-bold text-sm" style="color:var(--secondary)">₦15,000</p>
       </div>

       <div class="glass-card p-4 flex items-center justify-between">
          <div class="flex items-center gap-3">
             <div class="w-10 h-10 rounded-xl bg-orange-50 flex items-center justify-center">
                <i data-lucide="clock" class="w-5 h-5 text-orange-500"></i>
             </div>
             <div>
                <p class="font-outfit font-semibold text-sm" style="color:var(--secondary)">Refund (Math Session)</p>
                <p class="font-inter text-xs" style="color:rgba(26,43,68,.4)">Mar 28, 2026</p>
             </div>
          </div>
          <p class="font-outfit font-bold text-sm text-red-500">- ₦2,500</p>
       </div>

       <div class="glass-card p-4 flex items-center justify-between">
          <div class="flex items-center gap-3">
             <div class="w-10 h-10 rounded-xl bg-emerald-50 flex items-center justify-center">
                <i data-lucide="check" class="w-5 h-5 text-emerald-500"></i>
             </div>
             <div>
                <p class="font-outfit font-semibold text-sm" style="color:var(--secondary)">Bank Transfer</p>
                <p class="font-inter text-xs" style="color:rgba(26,43,68,.4)">Mar 15, 2026</p>
             </div>
          </div>
          <p class="font-outfit font-bold text-sm" style="color:var(--secondary)">₦20,000</p>
       </div>
    </div>
  </div>

</div>

<!-- Bottom Nav (Tutor) -->
<nav class="bottom-nav">
  <a href="tutor-dashboard.html" class="nav-item">
    <i data-lucide="layout-dashboard" class="w-5 h-5"></i><span>Dashboard</span>
  </a>
  <a href="#" class="nav-item">
    <i data-lucide="calendar" class="w-5 h-5"></i><span>Schedule</span>
  </a>
  <a href="tutor-earnings.html" class="nav-item active">
    <i data-lucide="wallet" class="w-5 h-5"></i><span>Earnings</span>
  </a>
  <a href="tutor-profile-edit.html" class="nav-item">
    <i data-lucide="user" class="w-5 h-5"></i><span>Profile</span>
  </a>
</nav>

<script>
  lucide.createIcons();
</script>
</body>
</html>
