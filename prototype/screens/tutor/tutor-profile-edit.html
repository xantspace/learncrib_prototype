<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LearnCrib – Edit Tutor Profile</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{primary:'#1939D4',secondary:'#0A1444',accent:'#F0B429'},fontFamily:{outfit:['Plus Jakarta Sans','sans-serif'],inter:['Plus Jakarta Sans','sans-serif']}}}}</script>
  <link rel="stylesheet" href="../assets/css/main.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
</head>
<body class="bg-gray-50">
<div class="container-app pb-28">

  <!-- Header -->
  <div class="px-5 pt-12 pb-6 flex items-center justify-between sticky top-0 bg-white z-40 bg-opacity-90 backdrop-blur-md">
    <button onclick="history.back()" class="w-10 h-10 rounded-2xl glass-card flex items-center justify-center">
      <i data-lucide="arrow-left" class="w-4 h-4 text-gray-500"></i>
    </button>
    <h1 class="font-outfit font-bold text-xl" style="color:var(--secondary)">Edit Profile</h1>
    <button class="font-outfit font-bold text-sm" style="color:var(--primary)">Save</button>
  </div>

  <!-- Forms -->
  <div class="px-5 flex flex-col gap-6">

    <!-- Avatar -->
    <div class="flex flex-col items-center">
       <div class="relative">
          <div class="w-24 h-24 rounded-3xl border-4 border-white flex items-center justify-center font-outfit font-bold text-white text-3xl shadow-lg" style="background:linear-gradient(135deg,var(--primary),hsl(175,80%,25%))">KO</div>
          <button class="absolute -bottom-1 -right-1 w-8 h-8 rounded-xl bg-white shadow-md flex items-center justify-center border border-gray-100">
             <i data-lucide="camera" class="w-4 h-4 text-primary"></i>
          </button>
       </div>
       <p class="font-inter text-xs mt-3" style="color:rgba(26,43,68,.4)">Change Photo</p>
    </div>

    <!-- Basic Info Section -->
    <section>
       <h3 class="font-outfit font-semibold text-xs uppercase tracking-widest mb-3" style="color:rgba(26,43,68,.4)">Basic Info</h3>
       <div class="flex flex-col gap-4">
          <div class="input-wrapper">
             <i data-lucide="user" class="w-4 h-4 input-icon"></i>
             <input type="text" value="Kolade Okonkwo" class="input-field" placeholder="Full Name" />
          </div>
          <div class="input-wrapper">
             <i data-lucide="map-pin" class="w-4 h-4 input-icon"></i>
             <input type="text" value="Lagos, Nigeria" class="input-field" placeholder="Location" />
          </div>
       </div>
    </section>

    <!-- Professional Settings -->
    <section>
       <h3 class="font-outfit font-semibold text-xs uppercase tracking-widest mb-3" style="color:rgba(26,43,68,.4)">Professional Settings</h3>
       <div class="flex flex-col gap-4">
          <div>
             <p class="text-xs font-inter mb-2" style="color:rgba(26,43,68,.6)">Bio</p>
             <textarea class="input-field resize-none h-24" placeholder="Describe your teaching experience…">Passionated educator with a B.Sc in Mathematics. Specializing in JAMB & WAEC prep.</textarea>
          </div>
          <div>
             <p class="text-xs font-inter mb-2" style="color:rgba(26,43,68,.6)">Hourly Rate (₦)</p>
             <div class="input-wrapper">
                <span class="input-icon font-inter text-sm font-bold opacity-30">₦</span>
                <input type="number" value="2500" class="input-field" />
             </div>
          </div>
       </div>
    </section>

    <!-- Subjects -->
    <section>
       <div class="flex items-center justify-between mb-3">
          <h3 class="font-outfit font-semibold text-xs uppercase tracking-widest" style="color:rgba(26,43,68,.4)">Subjects</h3>
          <button class="text-xs font-inter font-bold" style="color:var(--primary)">+ Add Subject</button>
       </div>
       <div class="flex flex-wrap gap-2">
          <div class="badge badge-teal flex items-center gap-2">Mathematics <i data-lucide="x" class="w-3 h-3 cursor-pointer"></i></div>
          <div class="badge badge-teal flex items-center gap-2">Physics <i data-lucide="x" class="w-3 h-3 cursor-pointer"></i></div>
          <div class="badge badge-teal flex items-center gap-2">JAMB <i data-lucide="x" class="w-3 h-3 cursor-pointer"></i></div>
       </div>
    </section>

    <!-- Account Actions -->
    <section class="mt-4">
       <button class="w-full text-left p-4 rounded-2xl bg-white border border-gray-100 flex items-center justify-between">
          <span class="font-inter font-medium text-sm" style="color:var(--secondary)">Withdrawal Settings</span>
          <i data-lucide="chevron-right" class="w-4 h-4 text-gray-300"></i>
       </button>
       <a href="login.html" class="w-full text-center p-4 mt-8 rounded-2xl bg-red-50 font-outfit font-bold text-sm text-red-500 block">
          Log Out
       </a>
    </section>

  </div>
</div>

<!-- Bottom Nav (Tutor) -->
<nav class="bottom-nav">
  <a href="tutor-dashboard.html" class="nav-item">
    <i data-lucide="layout-dashboard" class="w-5 h-5"></i><span>Dashboard</span>
  </a>
  <a href="#" class="nav-item">
    <i data-lucide="calendar" class="w-5 h-5"></i><span>Schedule</span>
  </a>
  <a href="tutor-earnings.html" class="nav-item">
    <i data-lucide="wallet" class="w-5 h-5"></i><span>Earnings</span>
  </a>
  <a href="tutor-profile-edit.html" class="nav-item active">
    <i data-lucide="user" class="w-5 h-5"></i><span>Profile</span>
  </a>
</nav>

<script>
  lucide.createIcons();
</script>
</body>
</html>
