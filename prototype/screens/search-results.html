<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LearnCrib – Find Tutors</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{primary:'#1939D4',secondary:'#0A1444',accent:'#F0B429'},fontFamily:{outfit:['Plus Jakarta Sans','sans-serif'],inter:['Plus Jakarta Sans','sans-serif']}}}}</script>
  <link rel="stylesheet" href="../assets/css/main.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
</head>
<body class="bg-gray-50">
<div class="container-app pb-28">

  <!-- Header & Search -->
  <div class="px-5 pt-12 pb-4 bg-white sticky top-0 z-40 shadow-sm">
    <div class="flex items-center gap-3 mb-4">
       <button onclick="history.back()" class="w-10 h-10 rounded-2xl glass-card flex items-center justify-center flex-shrink-0">
          <i data-lucide="arrow-left" class="w-4 h-4 text-gray-500"></i>
       </button>
       <div class="input-wrapper flex-1">
          <i data-lucide="search" class="w-4 h-4 input-icon"></i>
          <input type="text" value="Mathematics" class="input-field" placeholder="Search tutors…" />
       </div>
       <button onclick="toggleFilters()" class="w-10 h-10 rounded-2xl glass-card flex items-center justify-center flex-shrink-0">
          <i data-lucide="sliders-horizontal" class="w-4 h-4 text-primary"></i>
       </button>
    </div>
    
    <!-- Filter Chips -->
    <div class="flex gap-2 overflow-x-auto pb-2 scrollbar-hide">
       <div class="badge badge-teal flex items-center gap-1.5 whitespace-nowrap">₦1,500 – ₦3,000 <i data-lucide="x" class="w-3 h-3"></i></div>
       <div class="badge badge-teal flex items-center gap-1.5 whitespace-nowrap">4.5+ ★ <i data-lucide="x" class="w-3 h-3"></i></div>
       <div class="badge badge-teal flex items-center gap-1.5 whitespace-nowrap">Online <i data-lucide="x" class="w-3 h-3"></i></div>
    </div>
  </div>

  <!-- Results Count -->
  <div class="px-5 py-4">
    <p class="font-inter text-xs font-semibold uppercase tracking-widest" style="color:rgba(26,43,68,.4)">24 Tutors Found</p>
  </div>

  <!-- Tutor List -->
  <div class="px-5 flex flex-col gap-4">
    
    <!-- Tutor 1 -->
    <a href="tutor-profile.html" class="glass-card p-4 flex gap-4 bg-white active:scale-[0.98] transition-transform">
      <div class="w-20 h-20 rounded-2xl flex-shrink-0 relative">
        <div class="w-full h-full rounded-2xl flex items-center justify-center font-outfit font-bold text-white text-xl" style="background:linear-gradient(135deg,var(--primary),hsl(175,80%,25%))">KO</div>
        <span class="absolute -top-1 -right-1 w-6 h-6 rounded-full bg-accent flex items-center justify-center shadow-sm">
           <i data-lucide="shield-check" class="w-3.5 h-3.5 text-white"></i>
        </span>
      </div>
      <div class="flex-1">
        <div class="flex justify-between items-start">
           <h3 class="font-outfit font-bold text-base" style="color:var(--secondary)">Kolade Okonkwo</h3>
           <p class="font-outfit font-bold text-sm" style="color:var(--primary)">₦2,500<span class="text-[10px] font-inter opacity-40">/hr</span></p>
        </div>
        <p class="font-inter text-xs mt-0.5" style="color:rgba(26,43,68,.5)">Mathematics, Physics, JAMB Prep</p>
        <div class="flex items-center gap-3 mt-2.5">
           <div class="flex items-center gap-1">
              <i data-lucide="star" class="w-3 h-3 text-accent fill-current"></i>
              <span class="text-xs font-bold font-outfit" style="color:var(--secondary)">4.9</span>
           </div>
           <div class="flex items-center gap-1 text-[10px] font-inter" style="color:rgba(26,43,68,.4)">
              <i data-lucide="users" class="w-3 h-3"></i> 124 Students
           </div>
           <div class="flex items-center gap-1 text-[10px] font-inter" style="color:rgba(26,43,68,.4)">
              <i data-lucide="check-circle" class="w-3 h-3"></i> 18 Sessions
           </div>
        </div>
      </div>
    </a>

    <!-- Tutor 2 -->
    <a href="tutor-profile.html" class="glass-card p-4 flex gap-4 bg-white">
      <div class="w-20 h-20 rounded-2xl flex-shrink-0 relative">
        <div class="w-full h-full rounded-2xl flex items-center justify-center font-outfit font-bold text-white text-xl" style="background:linear-gradient(135deg,hsl(220,60%,50%),hsl(220,40%,30%))">FB</div>
      </div>
      <div class="flex-1">
        <div class="flex justify-between items-start">
           <h3 class="font-outfit font-bold text-base" style="color:var(--secondary)">Fatima Bello</h3>
           <p class="font-outfit font-bold text-sm" style="color:var(--primary)">₦2,000<span class="text-[10px] font-inter opacity-40">/hr</span></p>
        </div>
        <p class="font-inter text-xs mt-0.5" style="color:rgba(26,43,68,.5)">English Literature, Verbal Reasoning</p>
        <div class="flex items-center gap-3 mt-2.5">
           <div class="flex items-center gap-1">
              <i data-lucide="star" class="w-3 h-3 text-accent fill-current"></i>
              <span class="text-xs font-bold font-outfit" style="color:var(--secondary)">4.8</span>
           </div>
           <div class="flex items-center gap-1 text-[10px] font-inter" style="color:rgba(26,43,68,.4)">
              <i data-lucide="users" class="w-3 h-3"></i> 89 Students
           </div>
        </div>
      </div>
    </a>

  </div>
</div>

<!-- Filter Modal (Overlay) -->
<div id="filter-modal" class="fixed inset-0 z-50 flex items-end justify-center hidden" style="background:rgba(26,43,68,.5)">
  <div class="bg-white w-full max-w-[430px] rounded-t-[40px] px-6 pt-8 pb-10 flex flex-col gap-6 slide-up shadow-2xl">
     <div class="flex items-center justify-between">
        <h2 class="font-outfit font-bold text-2xl" style="color:var(--secondary)">Filters</h2>
        <button onclick="toggleFilters()" class="w-9 h-9 rounded-xl bg-gray-50 flex items-center justify-center">
           <i data-lucide="x" class="w-4 h-4 text-gray-400"></i>
        </button>
     </div>

     <!-- Price Range -->
     <div>
        <p class="text-xs font-inter font-semibold uppercase tracking-widest mb-4" style="color:rgba(26,43,68,.4)">Price Range (₦)</p>
        <div class="flex items-center gap-3">
           <input type="number" value="1500" class="input-field text-center py-2.5" />
           <span class="text-gray-300">to</span>
           <input type="number" value="3000" class="input-field text-center py-2.5" />
        </div>
     </div>

     <!-- Rating -->
     <div>
        <p class="text-xs font-inter font-semibold uppercase tracking-widest mb-3" style="color:rgba(26,43,68,.4)">Minimum Rating</p>
        <div class="flex gap-2">
           <button class="badge px-4 py-2 border-2 border-primary text-primary font-bold">Any</button>
           <button class="badge px-4 py-2 border-2 border-gray-100 text-gray-400">3.5+</button>
           <button class="badge px-4 py-2 border-2 border-gray-100 text-gray-400">4.0+</button>
           <button class="badge px-4 py-2 border-2 border-gray-100 text-gray-400">4.5+</button>
        </div>
     </div>

     <!-- Location -->
     <div>
        <p class="text-xs font-inter font-semibold uppercase tracking-widest mb-3" style="color:rgba(26,43,68,.4)">Mode of Teaching</p>
        <div class="flex flex-col gap-2">
           <label class="flex items-center justify-between p-3 rounded-2xl bg-gray-50">
              <span class="text-sm font-inter">Online Sessions</span>
              <input type="checkbox" checked class="accent-teal-600" />
           </label>
           <label class="flex items-center justify-between p-3 rounded-2xl bg-gray-50">
              <span class="text-sm font-inter">Home Lessons (Lagos)</span>
              <input type="checkbox" class="accent-teal-600" />
           </label>
        </div>
     </div>

     <button onclick="toggleFilters()" class="btn-primary w-full justify-center mt-4">Apply Filters</button>
  </div>
</div>

<script>
  lucide.createIcons();
  function toggleFilters() {
    const modal = document.getElementById('filter-modal');
    modal.classList.toggle('hidden');
    lucide.createIcons();
  }
</script>
</body>
</html>
