<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LearnCrib – Splash</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{primary:'#1939D4',tealBrand:'#1939D4',secondary:'#0A1444',accent:'#F0B429'},fontFamily:{outfit:['Outfit','sans-serif'],inter:['Inter','sans-serif']}}}}</script>
  <link rel="stylesheet" href="../assets/css/main.css" />
</head>
<body class="bg-[#1939D4] min-h-screen flex items-center justify-center overflow-hidden">

  <div class="flex flex-col items-center justify-center p-8 slide-up">
    
    <!-- Logo B -->
    <div class="mb-6">
      <img src="../assets/img/logo_b.png" alt="LearnCrib Logo" class="w-48 object-contain" />
    </div>

    <!-- Tagline from Brand Kit -->
    <div class="text-center">
      <p class="font-outfit text-white text-lg font-medium opacity-90 tracking-wide">
        Where Learning Feels Like Home
      </p>
    </div>

  </div>

  <script>
    // After 2.5 seconds, go to the animated loading state, then to welcome
    setTimeout(() => {
      window.location.href = 'welcome.html';
    }, 2500);
  </script>

  <style>
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .slide-up {
      animation: slideUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }
  </style>
</body>
</html>
