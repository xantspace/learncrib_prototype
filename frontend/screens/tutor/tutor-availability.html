<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LearnCrib – My Availability</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{primary:'#1939D4',secondary:'#0A1444',accent:'#F0B429'},fontFamily:{outfit:['Plus Jakarta Sans','sans-serif'],inter:['Plus Jakarta Sans','sans-serif']}}}}</script>
  <link rel="stylesheet" href="../assets/css/main.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
</head>
<body>
<div class="container-app pb-28">

  <!-- Header -->
  <div class="px-5 pt-12 pb-4">
    <div class="flex items-center gap-2 text-sm mb-6" style="color:var(--secondary);opacity:.6" onclick="history.back()">
      <i data-lucide="arrow-left" class="w-4 h-4"></i> Back
    </div>
    <h1 class="font-outfit font-bold text-2xl" style="color:var(--secondary)">Weekly Schedule</h1>
    <p class="font-inter text-sm mt-0.5" style="color:rgba(26,43,68,.5)">Set your time slots and availability status</p>
  </div>

  <!-- Availability Toggle -->
  <div class="px-5 mb-8">
    <div class="glass-card p-5 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-2 h-2 rounded-full bg-green-500"></div>
        <div>
           <p class="font-outfit font-bold text-base" style="color:var(--secondary)">Available for booking</p>
           <p class="font-inter text-xs opacity-50">Students can find you in search results</p>
        </div>
      </div>
      <div class="w-12 h-6 rounded-full relative bg-primary cursor-pointer">
        <span class="absolute top-1 right-1 w-4 h-4 rounded-full bg-white shadow"></span>
      </div>
    </div>
  </div>

  <!-- Day Selection -->
  <div class="px-5 mb-10">
    <h3 class="font-outfit font-bold text-lg mb-4" style="color:var(--secondary)">Select Weekdays</h3>
    <div class="flex flex-wrap gap-2">
      <button class="w-11 h-11 rounded-2xl flex items-center justify-center font-outfit font-bold text-white text-sm" style="background:var(--primary)">M</button>
      <button class="w-11 h-11 rounded-2xl flex items-center justify-center font-outfit font-bold text-white text-sm" style="background:var(--primary)">T</button>
      <button class="w-11 h-11 rounded-2xl flex items-center justify-center font-outfit font-bold text-white text-sm" style="background:var(--primary)">W</button>
      <button class="w-11 h-11 rounded-2xl flex items-center justify-center font-outfit font-bold text-white text-sm" style="background:var(--primary)">T</button>
      <button class="w-11 h-11 rounded-2xl flex items-center justify-center font-outfit font-bold text-white text-sm" style="background:var(--primary)">F</button>
      <button class="w-11 h-11 rounded-2xl flex items-center justify-center font-outfit font-bold text-sm" style="background:rgba(26,43,68,0.05);color:var(--secondary)">S</button>
      <button class="w-11 h-11 rounded-2xl flex items-center justify-center font-outfit font-bold text-sm" style="background:rgba(26,43,68,0.05);color:var(--secondary)">S</button>
    </div>
  </div>

  <!-- Time Slots -->
  <div class="px-5">
    <div class="flex items-center justify-between mb-4">
      <h3 class="font-outfit font-bold text-lg" style="color:var(--secondary)">Time Slots</h3>
      <button class="text-xs font-inter font-bold" style="color:var(--primary)">+ Add New Slot</button>
    </div>
    
    <div class="flex flex-col gap-3">
      <div class="glass-card p-4 flex items-center justify-between">
        <div class="flex items-center gap-3">
           <i data-lucide="clock" class="w-4 h-4 text-gray-400"></i>
           <p class="font-inter text-sm font-medium" style="color:var(--secondary)">09:00 AM – 12:00 PM</p>
        </div>
        <button class="text-gray-400"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
      </div>

      <div class="glass-card p-4 flex items-center justify-between">
        <div class="flex items-center gap-3">
           <i data-lucide="clock" class="w-4 h-4 text-gray-400"></i>
           <p class="font-inter text-sm font-medium" style="color:var(--secondary)">02:00 PM – 05:00 PM</p>
        </div>
        <button class="text-gray-400"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
      </div>
    </div>
  </div>

  <!-- Save Button -->
  <div class="fixed bottom-28 left-0 w-full px-5">
    <button class="btn-primary w-full justify-center">
       <i data-lucide="check-circle" class="w-5 h-5"></i>
       Save Schedule Changes
    </button>
  </div>

</div>

<!-- Bottom Nav -->
<nav class="bottom-nav">
  <a href="tutor-dashboard.html" class="nav-item">
    <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
    <span>Dashboard</span>
  </a>
  <a href="tutor-students.html" class="nav-item">
    <i data-lucide="users" class="w-5 h-5"></i>
    <span>Students</span>
  </a>
  <a href="tutor-availability.html" class="nav-item active">
    <i data-lucide="calendar" class="w-5 h-5"></i>
    <span>Schedule</span>
  </a>
  <a href="tutor-earnings.html" class="nav-item">
    <i data-lucide="wallet" class="w-5 h-5"></i>
    <span>Earnings</span>
  </a>
  <a href="tutor-profile.html" class="nav-item">
    <i data-lucide="user" class="w-5 h-5"></i>
    <span>Profile</span>
  </a>
</nav>

<script>
  lucide.createIcons();
</script>
</body>
</html>
